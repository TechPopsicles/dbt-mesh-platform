name: dbt_platform CI

on:
  pull_request:
    paths:
      - "dbt_platform/**"
  push:
    branches:
      - main
    paths:
      - "dbt_platform/**"

env:
  DBT_PROJECT_DIR: dbt_platform
  DBT_PROFILES_DIR: dbt_platform

jobs:
  # ── PR job: slim model — only build what changed ──────────────────────────
  dbt-slim-ci:
    name: Slim CI (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-snowflake==1.8.0

      - name: Install dbt packages
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps

      - name: Download production manifest
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
        # Pull the latest prod manifest.json for state comparison
        # In practice store this in S3/GCS — using inline placeholder here
        run: |
          mkdir -p ${{ env.DBT_PROJECT_DIR }}/target-prod
          echo "Downloading prod manifest..."
          # aws s3 cp s3://your-bucket/dbt-platform/manifest.json \
          #   ${{ env.DBT_PROJECT_DIR }}/target-prod/manifest.json

      - name: dbt build (slim — modified + downstream)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      dbt_developer_role
          SNOWFLAKE_WAREHOUSE: dbt_wh
          SNOWFLAKE_DATABASE:  DBT_MESH_DEV
          SNOWFLAKE_SCHEMA:    platform_ci_${{ github.event.pull_request.number }}
        run: |
          dbt build \
            --select state:modified+ \
            --defer \
            --state target-prod \
            --target dev \
            --profiles-dir .

      - name: Post CI summary comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### dbt_platform CI ${status}\n` +
                    `**Ran:** \`state:modified+\` (slim model)\n` +
                    `**Target:** \`DBT_MESH_DEV.platform_ci_${{ github.event.pull_request.number }}\`\n` +
                    `**Status:** ${{ job.status }}`
            });

  # ── Merge job: full production run ────────────────────────────────────────
  dbt-full-deploy:
    name: Full Deploy (main)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: pip install dbt-snowflake==1.8.0

      - name: Install dbt packages
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps

      - name: dbt build (full)
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        env:
          SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE:      dbt_developer_role
          SNOWFLAKE_WAREHOUSE: dbt_wh
          SNOWFLAKE_DATABASE:  DBT_MESH_PROD
          SNOWFLAKE_SCHEMA:    platform
        run: |
          dbt build --target prod --profiles-dir .

      - name: Upload manifest to artifact store
        if: success()
        run: |
          echo "Upload target/manifest.json to your artifact store here"
          # aws s3 cp dbt_platform/target/manifest.json \
          #   s3://your-bucket/dbt-platform/manifest.json
