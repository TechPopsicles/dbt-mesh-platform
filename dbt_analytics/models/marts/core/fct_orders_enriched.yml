version: 2

models:
  - name: fct_orders_enriched
    description: >
      Cross-domain order fact. Joins Commercial orders with customer
      dimension for executive reporting. The authoritative revenue mart
      for all Analytics consumers. Grain: order_key.
    config:
      tags: ["analytics", "marts", "core"]
      meta:
        owner:  analytics-team@techminionacademy.com
        grain:  order_key
        inputs: ["commercial.fct_orders_v1", "commercial.dim_customers_v1"]
    columns:
      - name: order_key
        description: Primary key for the order.
        data_type: number(38,0)
        data_tests: [not_null, unique]
      - name: customer_key
        description: Foreign key to the customer.
        data_type: number(38,0)
        data_tests: [not_null]
      - name: order_date
        description: Date the order was placed.
        data_type: date
        data_tests: [not_null]
      - name: gross_revenue
        description: >
          THE authoritative gross revenue figure. Source: Commercial fct_orders_v1.
          Includes tax. Used in all executive reporting.
        data_type: number(18,2)
        data_tests: [not_null]
      - name: net_revenue
        description: Revenue after discounts, before tax.
        data_type: number(18,2)
        data_tests: [not_null]
      - name: market_segment
        description: Customer market segment from dim_customers.
        data_type: varchar
      - name: customer_tier
        description: Customer value tier (platinum/gold/silver/bronze).
        data_type: varchar
      - name: order_month
        description: Order month for time-series aggregation.
        data_type: date
      - name: order_quarter
        description: Order quarter.
        data_type: date
      - name: order_year
        description: Order year.
        data_type: number(38,0)
      - name: order_status
        description: Raw order status code.
        data_type: varchar
      - name: order_status_label
        description: Human-readable order status.
        data_type: varchar
      - name: order_priority
        description: Order priority code.
        data_type: varchar
      - name: is_high_priority
        description: True if order priority is URGENT or HIGH.
        data_type: boolean
      - name: nation_key
        description: Nation foreign key for geographic analysis.
        data_type: number(38,0)
      - name: is_high_value
        description: True if customer account balance >= 5000.
        data_type: boolean
      - name: is_delinquent
        description: True if customer has negative account balance.
        data_type: boolean
      - name: line_item_count
        description: Number of line items on this order.
        data_type: number(38,0)
      - name: avg_discount_rate
        description: Average discount rate across line items.
        data_type: number(18,2)
